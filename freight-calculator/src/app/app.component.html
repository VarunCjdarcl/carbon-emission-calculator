@if (calculatorService.showResults()) {
  <app-results-dashboard />
} @else if (calculatorService.limitReached()) {
  <div class="calculator-wrapper">
    <app-header />
    <div class="calculator-body">
      <div class="limit-reached-screen">
        <span class="material-icons limit-icon">block</span>
        <h2>Daily Limit Reached</h2>
        <p>You have used all 10 calculations allowed for today.</p>
        <p>Please try again tomorrow.</p>
      </div>
    </div>
  </div>
} @else {
  <div class="calculator-wrapper">
    <app-header />
    <div class="calculator-body">
      <app-stepper />
    </div>
  </div>
}
