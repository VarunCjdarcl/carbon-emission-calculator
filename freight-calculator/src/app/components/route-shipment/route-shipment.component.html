<div class="route-shipment">
  <h2 class="section-title">Route the shipment</h2>
  <p class="section-desc">
    Enter the transport distance. You can add further transport legs later.
  </p>

  @if (showError) {
    <div class="error-banner">
      <span class="material-icons error-icon">error</span>
      Please enter the transport distance
    </div>
  }

  <div class="form-group">
    <label class="form-label">Distance</label>
    <div class="input-row">
      <input
        type="number"
        class="form-input"
        [(ngModel)]="distance"
        placeholder="0"
        min="0"
      />
      <span class="unit-label">KM</span>
    </div>
  </div>

  <button class="btn-primary" (click)="onNext()" [disabled]="distance <= 0">
    Next
  </button>
</div>
